<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xoner – Coming Soon</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Xoner Intro Video -->
    <div
        id="intro-overlay"
        role="button"
        tabindex="0"
        aria-label="Tap anywhere to enter Xoner"
        style="position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #05000d; cursor: pointer; overflow: hidden; opacity: 1; transition: opacity 0.8s ease;"
    >
        <video
            id="intro-video"
            preload="auto"
            playsinline
            style="width: 100%; height: 100%; object-fit: cover; display: block;"
        >
            <source src="xoner-intro.mp4" type="video/mp4" />
        </video>

        <div
            id="intro-prompt"
            style="position: absolute; left: 0; right: 0; bottom: 42px; text-align: center; color: #ffffff; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; text-shadow: 0 0 14px rgba(0, 0, 0, 0.8); pointer-events: none;"
        >
            Tap anywhere to enter
        </div>
    </div>

    <!-- Top Right Nav -->
    <div class="top-nav">
        <a href="about.html" class="top-link">About</a>
        <a href="how-it-works.html" class="top-link">How It Works</a>
        <a href="contact.html" class="top-link">Contact Us</a>
    </div>

    <div class="page">

        <div class="hero-content" id="hero">

            <div class="logo-aura">
                <img
                    src="xoner-logo-x.png"
                    alt="Xoner Logo"
                    class="xoner-logo"
                    id="logo"
                />
            </div>

            <h1 class="title">COMING SOON</h1>
            <p class="subtitle">Rate. Match. Connect.</p>

            <a
                href="https://instagram.com/xonerapp"
                target="_blank"
                class="insta"
            >
                @xonerapp
            </a>

            <a
                href="join-testing.html"
                style="display: inline-block; margin-top: 24px; padding: 12px 24px; border-radius: 999px; background: linear-gradient(90deg, #A854FF, #ff00c8); color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; box-shadow: 0 0 20px rgba(220, 90, 255, 0.5);"
            >
                Join Testing
            </a>

        </div>

    </div>

    <!-- Footer Legal Links (minimal change) -->
    <div class="legal-footer" style="position: fixed; left: 0; right: 0; bottom: 14px; text-align: center; font-size: 12px; color: rgba(196, 190, 223, 0.9); z-index: 10;">
        <a href="terms.html" style="color: #A854FF; text-decoration: underline; margin: 0 8px;">Terms</a>
        <span style="opacity: 0.7;">·</span>
        <a href="privacy-policy.html" style="color: #A854FF; text-decoration: underline; margin: 0 8px;">Privacy Policy</a>
        <span style="opacity: 0.7;">·</span>
        <a href="cookies-policy.html" style="color: #A854FF; text-decoration: underline; margin: 0 8px;">Cookies Policy</a>
        <span style="opacity: 0.7;">·</span>
        <a href="safety.html" style="color: #A854FF; text-decoration: underline; margin: 0 8px;">Safety</a>
    </div>

    <!-- Parallax Script -->
    <script>
        const hero = document.getElementById("hero");
        const logo = document.getElementById("logo");

        window.addEventListener("mousemove", (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 16;
            const y = (e.clientY / window.innerHeight - 0.5) * 16;

            hero.style.transform =
                "translateZ(0) rotateX(" + (-y / 2) + "deg) rotateY(" + (x / 2) + "deg)";
            logo.style.transform =
                "translate(" + (x / 3) + "px," + (y / 3) + "px)";
        });

        window.addEventListener("mouseleave", () => {
            hero.style.transform = "rotateX(0deg) rotateY(0deg)";
            logo.style.transform = "translate(0,0)";
        });

        const introOverlay = document.getElementById("intro-overlay");
        const introVideo = document.getElementById("intro-video");
        const introPrompt = document.getElementById("intro-prompt");

        let introStarted = false;

        function startIntro() {
            if (introStarted) {
                return;
            }

            introStarted = true;
            introPrompt.style.display = "none";
            introVideo.play();
        }

        function closeIntro() {
            introOverlay.style.opacity = "0";

            setTimeout(() => {
                introOverlay.style.display = "none";
            }, 800);
        }

        introOverlay.addEventListener("click", startIntro);

        introOverlay.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                startIntro();
            }
        });

        introVideo.addEventListener("ended", closeIntro);
    </script>

</body>
</html>
